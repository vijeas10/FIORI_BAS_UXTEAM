# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: uxteam
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: TRL_EN
          url: https://7a456f9d-5fc0-4e0c-b7a7-81e65d431356.abap.us10.hana.ondemand.com
          client: '100'
        app:
          name: UXTEAM
          description: An SAP Fiori application.
          package: ZUXTEAM_APP
          transport: REPLACE_WITH_TRANSPORT
        exclude:
          - /test/
